<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Entulho</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>

        @font-face {
            font-family: 'Montserrat';
            src: url('fonts/montserrat/Montserrat-Regular.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            font-family: Montserrat, sans-serif;
            background: #fff;
            min-height: 100vh;
            padding-bottom: 80px; 
            box-sizing: border-box;
        }

        header, nav {
            background: #fff;
            box-shadow: 0 2px 11px #0001;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 4vw 10px 2vw;
            position: sticky;
            top: 0;
            z-index: 9;
        }
        .logo {
            color: #b4d394;
            font-size: 2rem;
            font-weight: bold;
        }
        .menu {
            display: flex;
            gap: 24px;
        }
        .menu-btn {
            background: #b6e89b;
            border-radius: 18px;
            border: none;
            padding: 8px 20px;
            font-family: Montserrat, sans-serif;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.21s, box-shadow 0.21s, transform 0.12s;
            cursor: pointer;
            box-shadow: 3px 3px #a5bf8b;
            outline: none;
        }
        .menu-btn.selected, .menu-btn:hover {
            background: #eafdc9;
            box-shadow: 5px 5px #a5bf8b;
            transform: scale(1.05);
        }
        .main-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 10px 80px 10px;
            min-height: 68vh;
            animation: fadein 0.4s;
        }
        @keyframes fadein {
            from { opacity: 0;}
            to {opacity: 1;}
        }

        /* Cards para produtos/categorias */
        .produtos-grid, .categorias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 28px;
            margin-top: 30px;
            justify-content: start;
        }
        .card {
            background: #fff;
            padding: 18px 18px 12px 18px;
            border-radius: 14px;
            box-shadow: 0 3px 18px #0002;
            transition: transform 0.22s, box-shadow 0.22s;
            width: 100%;
            max-width: 270px;
            margin: 0 auto;
            cursor: pointer;
            overflow: hidden;
        }
        .card:hover {
            box-shadow: 0 5px 24px #0003;
            transform: translateY(-7px) scale(1.04);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .card strong {
            display: block;
            margin-bottom: 6px;
        }

        .btn-pedidos {
            background-color: #437144;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: Montserrat, sans-serif;
            font-size: 0.8rem;
            margin-top: 10px;
            transition: background 0.2s;
            z-index: 10; /* Garante que ele fique acima do clique do card */
        }

        .btn-pedidos:hover {
            background-color: #355a36;
        }

        /* Detalhes de produto */
        .produto-detalhe {
            display: flex;
            flex-wrap: wrap;
            gap: 55px;
            align-items: flex-start;
        }
        .produto-detalhe img {
            border-radius: 12px;
            box-shadow: 0 4px 18px #aeffb442;
            width: 370px;
            max-width: 94vw;
        }
        .produto-info {
            min-width: 290px;
            flex: 1;
            min-height: 260px;
        }
        .botao-destaque {
            background: #b6e89b;
            border-radius: 32px;
            border: none;
            padding: 13px 44px;
            font-family: Montserrat, sans-serif;
            font-size: 1.25em;
            font-weight: bold;
            transition: background 0.15s, transform 0.12s;
            box-shadow: 2px 2px #a5bf8b;
            margin-top: 27px;
            cursor: pointer;
            outline: none;
        }
        .botao-destaque:active {
            background: #eafdc9;
            transform: scale(0.97);
        }

        /* Formulários simplificados */
        .form-cadastro {
            max-width: 350px;
            margin: 0 auto;
            background: #eafdc9;
            padding: 30px 24px;
            border-radius: 12px;
            box-shadow: 4px 4px #a5bf8b;
        }
        .form-cadastro input, .form-cadastro select {
            width: 100%;
            margin-bottom: 12px;
            padding: 7px;
            border-radius: 6px;
            border: 1px solid #bde4a5;
            font-size: 1em;
        }
        .form-cadastro label {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 2px;
        }
        .form-cadastro .botao-destaque {
            width: 100%;
        }

        /* Footer */
        footer {
            background: #eafdc9;
            padding: 15px 40px;
            color: #437144;
            font-size: 1.08rem;
            position: fixed;
            width: 100%;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            border-top: 2px solid #c9ebac;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        .footer-logo {
            font-weight: bold;
            font-size: 1.2rem;
            color: #b4d394;
        }

        @media (max-width:900px) {
            header, nav, .main-content, footer {
                padding-left: 12px;
                padding-right: 12px;
            }
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">Novo Entulho</span>
        <nav class="menu">
            <button class="menu-btn selected" onclick="navigate('home')">Início</button>
            <button class="menu-btn" onclick="navigate('categorias')">Categorias</button>
            <button class="menu-btn" onclick="navigate('anunciar')">Anunciar</button>
            <button class="menu-btn" onclick="navigate('cadastro')">Cadastro</button>
            <button class="menu-btn" onclick="navigate('conta')">Minha Conta</button>
        </nav>
    </header>
    <main>
        <section class="main-content" id="main-content"></section>
    </main>
    <footer>
        <span class="footer-logo">Novo Entulho</span>
        <span><b>UFPA - Campus Belém - GEPPES - @GEPPES | 8h-12h/14h-18h | (91) 98441-9680</b></span>
    </footer>

    <script src="Jquery/jquery-3.6.0.min.js"></script>
    <script src="Jquery/jquery.mask.js"></script>
    <script>
        // Dados fictícios de exemplo, pode carregar do backend ou localStorage!
        const categorias = [
            {nome:"Madeiras", img:"img/madeiras.jpg"},
            {nome:"Concretos", img:"img/concretos.jpg"},
            {nome:"Ferros e Aços", img:"img/ferros.jpg"},
            {nome:"Azulejos", img:"img/azulejos.jpg"},
            {nome:"Aterros", img:"img/aterros.jpg"},
            {nome:"Outros", img:"img/Outros.jpg"},
        ];

        // Estados de navegação
        function navigate(view, param) {
            document.querySelectorAll('.menu-btn').forEach(btn=>btn.classList.remove('selected'));
            if(view==="home") document.querySelectorAll('.menu-btn')[0].classList.add('selected');
            if(view==="categorias") document.querySelectorAll('.menu-btn')[1].classList.add('selected');
            if(view==="anunciar") document.querySelectorAll('.menu-btn')[2].classList.add('selected');
            if(view==="cadastro") document.querySelectorAll('.menu-btn')[3].classList.add('selected');
            if(view==="conta") document.querySelectorAll('.menu-btn')[4].classList.add('selected');

            if(view==="home") renderHome();
            if(view==="categorias") renderCategorias();
            if(view==="categoria") renderProdutos(param);
            if(view==="produto") renderProdutoDetalhe(param);
            if(view==="anunciar") renderAnunciar();
            if(view==="cadastro") renderEscPerfil();
            if(view==="conta") renderConta();
        }

        // INICIO
        function renderHome() {
            document.getElementById('main-content').innerHTML = `
                <h1>Bem-vindo ao <span style="background:#eafdc9;padding:8px;border-radius:7px;">Novo Entulho</span></h1>
                <p style="font-size:1.4rem;margin:20px 0 34px 0;">Reutilize e faça a diferença! Compre, venda e anuncie entulhos e sobras de construção civil de forma sustentável.</p>
                <button class="botao-destaque" onclick="navigate('categorias')">Explorar Categorias</button>
                <button class="botao-destaque" onclick="navigate('anunciar')">Quero Anunciar</button>
                <div style="margin:60px 0 0 2px;color:#90ba78;font-size:1.3rem;">Muito mais que uma loja, uma comunidade <b>sustentável</b>.</div>
            `;
        }

        // CATEGORIAS
        function renderCategorias() {
            let grid = categorias.map((cat,i) =>
                `<div class="card" onclick="navigate('categoria', '${cat.nome}')">
                    <img src="${cat.img}" alt="${cat.nome}">
                    <strong>${cat.nome}</strong>
                </div>`
            ).join('');
            document.getElementById('main-content').innerHTML = `
                <h1>Categorias</h1>
                <div class="categorias-grid">${grid}</div>
            `;
        }

        // PRODUTOS POR CATEGORIA
        function renderProdutos(catSel) {
            // Mostra um carregando básico
            document.getElementById('main-content').innerHTML = `<h1>${catSel}</h1><div class="produtos-grid">Carregando anúncios...</div>`;

            $.ajax({
                url: 'get_produtos.php',
                type: 'GET',
                data: {categoria: catSel},
                dataType: 'json',
                success: function(produtos) {
                    let html = '';
                    
                    if (produtos.length > 0) {
                        html = produtos.map(p => `
                            <div style="padding: 20px;">
                                <button class="menu-btn" onclick="renderCategorias()">Voltar para Categorias</button>
                            <div style="margin-top: 30px;" class="card" onclick="navigate('produto', ${p.id})">
                                <img src="${p.imagem_path}" alt="${p.titulo}">
                                <strong>${p.titulo}</strong>
                                <p>R$ ${parseFloat(p.valor).toFixed(2)}</p>
                            </div>
                        `).join('');
                    } else {
                        html = '<p>Nenhum anúncio encontrado nesta categoria.</p>';
                    }
                    
                    document.querySelector('.produtos-grid').innerHTML = html;
                    html += `</div>`;
                main.innerHTML = html;
                }
            });
        }

        // DETALHE DE PRODUTO
        function renderProdutoDetalhe(id, trueButton = true){
            document.getElementById('main-content').innerHTML = "Carregando detalhes...";

            $.getJSON('get_detalhesproduto.php', { id: id }, function(p) {
                document.getElementById('main-content').innerHTML = `
                    <div class="produto-detalhe">
                        <img src="${p.imagem_path}" alt="${p.titulo}">
                        
                        <div class="produto-info">
                            <h1>${p.titulo}</h1>
                            <p style="color: #437144; font-weight: bold; font-size: 1.5rem;">
                                ${p.valor > 0 ? 'R$ ' + parseFloat(p.valor).toFixed(2) : 'Gratuito / Doação'}</p>
                            <hr>

                            <h3>Anunciante</h3>
                            <p>${p.nome_vendedor}</p>

                            <h3>Descrição</h3>
                            <p>${p.descricao}</p>
                            
                            <h3>Localização</h3>
                            <p>${p.endereco} - CEP: ${p.cep}</p>

                            <iframe width= "100%"
                            height= "300px"
                            style= "border:0; border-radius:12px; margin-top:10px;"
                            loading= "lazy";
                            allowfullscreen
                            src="https://www.google.com/maps?q=${encodeURIComponent(p.endereco)}&hl=pt&output=embed"></iframe>
                            
                            <h3>Frete</h3>
                            <p>${p.frete}</p>

                            ${trueButton ? `
                                <button class="botao-destaque" onclick="realizarCompra(${p.id})">
                                    Tenho Interesse
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
        }

        //FUNÇÃO QUE PROCESSA OS PEDIDOS
        function realizarCompra(id) {
            if (!confirm("Confirmar interesse neste material?")) return;

            $.post('pedidos.php', { id_anuncio: id })
            .done(function(resposta) {
                resposta = resposta.trim();

                if (resposta === "sucesso") {
                    $(`button[onclick="realizarCompra(${id})"]`).prop("disabled", true).text("Interesse enviado");
                } 
                else if (resposta === "erro_login") {
                    alert("Você precisa estar logado!");
                    renderLogin();
                } 
                else {
                    alert(resposta);
                }
            })
            .fail(function() {
                alert("Erro ao conectar com o servidor.");
            });
        }

        function finalizarVenda(idAnuncio, idPedido) {
            if (!confirm("Confirmar venda deste produto?")) return;

            $.post('conf_venda.php', {
                id_anuncio: idAnuncio,
                id_pedido: idPedido
            }, function(resposta) {

                if (resposta.trim() === "sucesso") {
                    renderConta();
                } else if (resposta.trim() === "erro_permissao") {
                    alert("Você não tem permissão para isso.");
                } else {
                    alert("Erro: " + resposta);
                }

            });
        }

        // FORMULÁRIO DE ANÚNCIO
        function renderAnunciar() {
        document.getElementById('main-content').innerHTML = `
            <h1>Anunciar Material</h1>
            <form id="form-anuncio" class="form-cadastro" enctype="multipart/form-data">
                <label>Título do Material:</label>
                <input type="text" name="titulo" required>

                <label>Categoria:</label>
                <select name="categoria" required>
                    ${categorias.map(cat=>`<option value="${cat.nome}">${cat.nome}</option>`).join('')}
                </select>

                <label>Descrição:</label>
                <input type="text" name="descricao" required>

                <label>Valor (R$):</label>
                <input type="number" name="valor" min="0" step="any" required>

                <label>Frete (R$):</label>
                <input type="number" name="frete" min="0" step="any" required>

                <label>Imagem (Máx 10MB): </label>
                <input type="file" name="imagem" required>
                <div id="mensagemResposta" style="text-align: center; margin-top: 20px; font-weight: bold; color: black;"></div>
                <button style="text-align: center;" class="menu-btn" type="submit">Publicar</button>
            </form>

        `;
        //Ativa o envio assim que o formulário aparece na tela
        $("#form-anuncio").on("submit", function(e) {
            e.preventDefault(); // Impede de sair da página

            var formData = new FormData(this);
            $("#mensagemResposta").html("Processando anúncio...");

            $.ajax({
                url: 'anunciar.php',
                type: 'POST',
                data: formData,
                success: function(resposta) {
                    const cor = resposta.includes("sucesso") ? "green" : "red";
                    $("#mensagemResposta").css('color', cor).html(resposta);
                    // Se a resposta tiver a palavra 'sucesso', limpa o formulário
                    if(resposta.indexOf("sucesso") !== -1) {
                        $("#form-anuncio")[0].reset();
                    }
                },
                cache: false,
                contentType: false,
                processData: false
            });
        });
    }
        //Perfil/Vendedor
        function renderEscPerfil() {
            document.getElementById('main-content').innerHTML = `
                <div class="form-cadastro" style="text-align:center; padding:40px;">
                    <h1>Vamos Começar?</h1>
                    <p>Escolha o tipo de conta a ser criada</p>
                    <p style="color:red; font-size:14px;">Restrito exclusivamente a residentes de Belém, Ananindeua e Marituba.</p>
                    
                    <div style="display:flex; justify-content:center; gap:20px; margin-top:30px;">
                        <button class="menu-btn" onclick="renderCadastro('Comprador')">Perfil Comprador</button>
                        <button class="menu-btn" onclick="renderCadastro('Vendedor')">Perfil Vendedor</button>
                    </div>
                    <p style="margin-top:20px;">Já possui conta? <a href="#" onclick="event.preventDefault();renderLogin()">Entrar.</a></p>
                </div>
            `;
        }

        //TELA DE CADASTRO
        function renderCadastro(tipoPerfil) {
            document.getElementById('main-content').innerHTML = `
                <h1>Cadastro do ${tipoPerfil}</h1>
                <form id="form-cadastro" class="form-cadastro">
                    <input type="hidden" name="perfil_usuario" value="${tipoPerfil}">
                    <label>Nome:</label>
                        <input type="text" name="nome" required>
                    <label>Tipo de pessoa:</label>
                        <select id="tipo_pessoa" name="tipo_pessoa">
                            <option selected disabled>Selecionar tipo:</option>
                            <option value="PF">Pessoa física</option>
                            <option value="PJ">Pessoa jurídica</option>
                        </select><br>
                    <label id="label-doc">CPF:</label>
                        <input type="text" name="cpf" id="doc_input" placeholder="Selecione o tipo primeiro:" required>
                    <label>Email:</label>
                        <input type="email" name="email" required>
                    <label>Telefone:</label>
                        <input type="text" name="telefone" placeholder="(00) 00000-0000" required>
                    <label>CEP:</label>
                        <input type="text" name="cep" placeholder="00000-000" required>
                    <label>Endereço:</label>
                        <input type="text" name="endereco" required>
                    <label>Senha:</label>
                        <input type="password" name="senha" id="senha" required>
                    <label>Confirmar senha:</label>
                        <input type="password" name="confirmar_senha" id="confirmar_senha" required>
                        <div id="mensagemResposta" style="text-align: center; margin-top: 20px; font-weight: bold;"></div>
                    <button type="submit" class="menu-btn" >Cadastrar</button>
                </form>

            `;
            //Aplica a máscara do telefone
            $('input[name="telefone"]').mask('(00) 00000-0000');
            $('input[name="cep"]').mask('00000-000');

            // Monitora o campo de CEP
            $('input[name="cep"]').on('blur', function() {
                let cep = $(this).val().replace(/\D/g, '');

                if (cep.length === 8) {

                    $.getJSON(`https://viacep.com.br/ws/${cep}/json/`, function(dados) {
                        if (!("erro" in dados)) {

                            let enderecoCompleto = `${dados.logradouro}, ${dados.bairro} - ${dados.localidade}/${dados.uf}`;

                            // Coloca tudo no campo de endereço
                            $('input[name="endereco"]').val(enderecoCompleto);

                            // Move o cursor para o final para o usuário só digitar o número da casa
                            $('input[name="endereco"]').focus();
                        } else {
                            alert("CEP não encontrado.");
                            $('input[name="endereco"]').val('');
                        }
                    });
                }
            });

            $('#tipo_pessoa').on('change', function() {
            const tipo = $(this).val();
            const inputDoc = $('input[name="cpf"]');
            const labelDoc = $('#label-doc');

            if (!tipo) return;

            inputDoc.unmask(); // Remove a máscara atual
            inputDoc.prop('disabled', false);

                if (tipo === 'PF') {
                    labelDoc.text('CPF:');
                    inputDoc.attr('placeholder', '000.000.000-00');
                    inputDoc.mask('000.000.000-00');
                } else {
                    labelDoc.text('CNPJ:');
                    inputDoc.attr('placeholder', '00.000.000/0000-00');
                    inputDoc.mask('00.000.000/0000-00');
                }
            });

            $('#form-cadastro').on('submit', function(e) {
                e.preventDefault();

                // Validação do Tipo de Pessoa
            const tipoPessoa = $('#tipo_pessoa').val();
            if (!tipoPessoa) { // Se for null ou a opção disabled
                $('#mensagemResposta').css('color', 'red').html("Por favor, selecione se você é Pessoa física ou jurídica.");
            return;
            }

            const dados = new FormData(this);

            $.ajax({
                url: 'cadastro.php',
                type: 'POST',
                data: dados,
                processData: false,
                contentType: false,
                success: function(resposta) {
                    // Se o PHP retornar sucesso, muda a cor para verde, ou vermelho caso contrário
                    const cor = resposta.includes("sucesso") ? "green" : "red";
                    $('#mensagemResposta').css('color', cor).html(resposta);

                    if(resposta.includes("sucesso")) {
                        renderConta();
                        }else{
                            $('#mensagemResposta').css('color', 'red').html(resposta);
                        }
                    }
                });
            });
        }

        //TELA DE LOGIN
        function renderLogin() {
            document.getElementById('main-content').innerHTML = `
                <div class="form-cadastro" style="max-width: 350px;">
                    <h1 style="text-align:center;">Entrar</h1>
                    <form id="form-login">
                        <label>E-mail:</label>
                        <input type="email" name="email" required placeholder="seu@email.com">
                        
                        <label>Senha:</label>
                        <input type="password" name="senha" required placeholder="******">
                        
                        <div id="mensagemLogin" style="text-align:center; margin: 10px 0; font-weight:bold;"></div>
                        
                        <button type="submit" class="botao-destaque" style="width:100%">Entrar</button>
                    </form>
                    <p style="text-align:center; margin-top:15px;">
                        Não tem conta? <a href="#" onclick="event.preventDefault(); renderEscPerfil()"">Cadastre-se</a>
                    </p>
                </div>
            `;

            // Lógica de envio do Login
            $('#form-login').on('submit', function(e) {
                e.preventDefault();
                const dados = new FormData(this);

                $.ajax({
                    url: 'login.php',
                    type: 'POST',
                    data: dados,
                    processData: false,
                    contentType: false,
                    success: function(resposta) {
                        if (resposta.trim() === "sucesso") {
                            renderConta(); // Se logou, vai para o perfil
                        } else {
                            $('#mensagemLogin').css('color', 'red').html(resposta);
                        }
                    }
                });
            });
        }

        //MINHA CONTA
        function renderConta() {
            // Chamada AJAX para buscar dados da sessão e do banco
            $.ajax({
                url: 'get_perfil.php',
                type: 'GET',
                dataType: 'json',
                success: function(dados) {
                    if (dados.erro) {
                        // Se não estiver logado, aparecerá essa tela
                        document.getElementById('main-content').innerHTML = `
                            <div class="form-cadastro" style="text-align:center; padding:50px;">
                                <h2>Você ainda não possui uma conta.</h2>
                                <p>Para realizar compras ou anunciar materiais, você precisa criar uma conta.</p>
                                <button class="menu-btn" onclick="renderEscPerfil()">Cadastrar-se</button>
                                <br>
                                <p style="margin-top:30px;">Já tem uma conta? Faça login aqui.</p>
                                <button class="menu-btn" onclick="renderLogin()">Fazer Login</button>
                            </div>
                        `;
                        return;
                    }
                    
                    let tituloHistorico = (dados.perfil === 'Vendedor') ? 'Minhas Vendas' : 'Últimas Compras';
                    let htmlHistorico = '';

                    let lista = dados.historico || [];
                    
                    if (lista && lista.length > 0) {
                        htmlHistorico = lista.map(p => {
            if (dados.perfil === 'Vendedor') {
                let statusAtual = p.status || 'ativo'; 
                let statusHTML = '';

                if (statusAtual === 'vendido') {
                    statusHTML = '<span style="color: green; font-weight: bold;">Negociado</span>';
                } else {
                    statusHTML = `<button class="btn-pedidos" onclick="event.stopPropagation(); verPedidos(${p.id})">Ver pedidos</button>`;
                }

                return `
                    <div class="card" onclick="renderProdutoDetalhe(${p.id})">
                        <img src="${p.imagem_path || 'img/default.png'}" alt="${p.titulo}">
                        <div style="padding: 10px;">
                            <strong>${p.titulo}</strong><br>
                            <span>R$ ${parseFloat(p.valor || 0).toFixed(2)}</span><br>
                            <div style="margin-top: 8px;">${statusHTML}</div>
                        </div>
                    </div>`;
                    } else {
                        // COMPRADOR
                        let statusPedido = '';
                        let corStatus = '';

                        if (p.status === 'pendente') {
                            statusPedido = 'Aguardando resposta';
                            corStatus = 'yellow';
                        } else if (p.status === 'aceito') {
                            statusPedido = 'Pedido aceito';
                            corStatus = 'green';
                        } else if (p.status === 'recusado') {
                            statusPedido = 'Pedido recusado';
                            corStatus = 'red';
                        } else if (p.status === 'cancelado') {
                            statusPedido = 'Pedido cancelado';
                            corStatus = 'gray';
                        } else {
                            statusPedido = 'Status desconhecido';
                            corStatus = 'blue';
                        }

                        return `
                            <div class="card" onclick="renderProdutoDetalhe(${p.id_anuncio})">
                                <img src="${p.imagem_path || 'img/default.png'}" alt="${p.titulo_anuncio || p.titulo}">
                                <div style="padding: 10px;">
                                    <strong>${p.titulo_anuncio || p.titulo}</strong><br>
                                    <span style="color: ${corStatus}; font-weight: bold; font-size: 0.85rem;">
                                        ${statusPedido}
                                    </span><br>
                                    <small>Anunciante: ${p.nome_vendedor || p.id_vendedor || ''}</small>
                                </div>
                            </div>`;
                    }
                }).join('');
                    } else {
                        htmlHistorico = dados.perfil === 'Vendedor'
                            ? '<p>Você ainda não anunciou nenhum material. <a href="#" onclick="event.preventDefault(); renderAnunciar()">Anunciar agora!</a></p>'
                            : '<p>Você ainda não efetuou nenhum pedido de compra. <a href="#" onclick="event.preventDefault(); renderCategorias()">Explorar aúncios!</a></p>';
                    }

                    document.getElementById('main-content').innerHTML = `
                        <h1>Minha Conta</h1>
                        <div style="display:grid;grid-template-columns: 250px 1fr; gap:55px; margin-top:20px;">
                            <div>
                                <img src="img/perfil_default.png" alt="Usuário" style="width:135px;border-radius:50%;margin-bottom:12px;">
                                <p><b>Nome:</b> ${dados.nome}</p>
                                <p><b>Email:</b> ${dados.email}</p>
                                <p><b>Telefone:</b> ${dados.telefone}</p>
                                <p><b>Perfil:</b> ${dados.perfil}</p>
                                <button class="botao-destaque" onclick="logout()">Sair</button>
                            </div>
                            <div>
                                <h2>${tituloHistorico}</h2>
                                <div class="produtos-grid">
                                    ${htmlHistorico}
                                </div>
                            </div>
                        </div>
                    `;
                },
                error: function() {
                    alert("Erro ao carregar dados da conta.");
                }
            });
        }

        function verPedidos(idAnuncio) {
            const main = document.getElementById('main-content');
            main.innerHTML = "<h2>Carregando pedidos...</h2>";

            $.getJSON('get_interesses.php', { id: idAnuncio }, function(lista) {
                let html = `
                    <div style="padding: 20px;">
                        <button class="menu-btn" onclick="renderConta()">Voltar para Minha Conta</button>
                        <h2 style="margin-top: 20px;">Solicitações para este anúncio</h2>
                `;

                if (lista.length === 0) {
                    html += "<p>Nenhum interessado até o momento.</p>";
                } else {
                    lista.forEach(p => {
                        let foneLimpo = p.telefone.replace(/\D/g, '');
                        let linkZap = `https://api.whatsapp.com/send?phone=55${foneLimpo}`;
                        
                        html += `
                            <div style="border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong>${p.nome}</strong><br>
                                    <span>WhatsApp: ${p.telefone}</span><br>
                                </div>
                                <div>
                                    <a href="${linkZap}" target="_blank" class="botao-destaque" style="background:#25D366; text-decoration:none; padding: 8px 15px; border-radius: 20px; color: white; display: inline-block;">
                                        WhatsApp
                                    </a>
                                    ${p.status === 'pendente' ? `
                                        <button class="botao-destaque" onclick="finalizarVenda(${idAnuncio}, ${p.id_pedido})" style="margin-left: 10px;">
                                            Confirmar Venda
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    });
                }

                html += `</div>`;
                main.innerHTML = html;
            });
        }

        //BOTÃO "SAIR"
        function logout() {
            if (confirm("Deseja realmente sair?")) {
                $.ajax({
                    url: 'logout.php',
                    type: 'GET',
                    success: function(resposta) {
                        if (resposta.trim() === "sucesso") {
                            renderConta();
                        }
                    },
                    error: function() {
                        alert("Erro ao tentar sair.");
                    }
                });
            }
        }

        // Primeira renderização!
        renderHome();

        // Suporte a navegação pelo botão/back do navegador
        window.onpopstate = function(e){
            let v = (e.state && e.state.view) || "home";
            if(v==="categoria") renderProdutos(e.state.param);
            else navigate(v, e.state?.param);
        }
        function navigate(view, param){
            history.pushState({view:view,param:param},"",`#${view}${param?"_"+param:""}`);
            // Chama a função correta:
            if(view==="home") renderHome();
            if(view==="categorias") renderCategorias();
            if(view==="categoria") renderProdutos(param);
            if(view==="produto") renderProdutoDetalhe(param, true);
            if(view==="produto_conta") renderProdutoDetalhe(param, false);
            if(view==="anunciar") renderAnunciar();
            if(view==="cadastro") renderEscPerfil();
            if(view==="conta") renderConta();
            // Menu
            document.querySelectorAll('.menu-btn').forEach(btn=>btn.classList.remove('selected'));
            if(view==="home") document.querySelectorAll('.menu-btn')[0].classList.add('selected');
            if(view==="categorias") document.querySelectorAll('.menu-btn')[1].classList.add('selected');
            if(view==="anunciar") document.querySelectorAll('.menu-btn')[2].classList.add('selected');
            if(view==="cadastro") document.querySelectorAll('.menu-btn')[3].classList.add('selected');
            if(view==="conta") document.querySelectorAll('.menu-btn')[4].classList.add('selected');
        }
    </script>
</body>
</html>
